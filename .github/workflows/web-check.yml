name: Web Static Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check WebApp
        run: npm run check:web

      - name: Check iOS WebApp bundle sync
        run: npm run check:ios-webapp-sync
